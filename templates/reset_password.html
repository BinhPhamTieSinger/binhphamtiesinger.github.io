<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - TieSinger</title>
    <link rel="stylesheet" href="/static/css/index.css">
    <link rel="stylesheet" href="/static/css/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header" id="myHeader">
        <!-- ... existing header code ... -->
        <div class="container header-content">
            <div class="logo-name">
                <img src="/static/assets/images/logo.png" alt="TieSinger Logo" class="logo">
                <h1>TieSinger</h1>
            </div>
            <nav class="navbar">
                <ul>
                    <li><a href="/">Home</a></li>
                    <li><a href="/forum">Forum</a></li>
                    <li><a href="/announcements">Announcements</a></li>
                    <li><a href="/projects">Projects</a></li>
                    <li><a href="/login">Login</a></li>
                </ul>
            </nav>
            <div class="menu-toggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </header>

    <div class="auth-container">
        <div class="auth-card">
            <h2>Reset Your Password</h2>
            
            {% if error %}
                <p class="error-message">{{ error }}</p>
            {% endif %}

            {% if invalid_token %}
                <p>This reset link is invalid or has expired. Please <a href="/forgot-password">request a new one</a>.</p>
            {% else %}
                <form action="/reset-password" method="post">
                    <!-- Pass the token from the URL back to the server -->
                    <input type="hidden" name="token" value="{{ token }}">
                    
                    <!-- MODIFIED: Added strength meter, matching register.html -->
                    <div class="form-group">
                        <label for="new_password">New Password</label>
                        <input type="password" id="new_password" name="new_password" required onkeyup="checkResetPasswordStrength()">
                        <div id="password-strength-meter-reset" class="password-strength-meter">
                            <div class="strength-bar" id="strength-bar-reset"></div>
                            <p id="strength-text-reset"></p>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="confirm_password">Confirm New Password</label>
                        <input type="password" id="confirm_password" name="confirm_password" required>
                    </div>
                    <button type="submit" class="btn btn-auth">Set New Password</button>
                </form>
            {% endif %}
            
            <p class="auth-link"><a href="/login">Back to Login</a></p>
        </div>
    </div>

    <script src="/static/js/index.js"></script>

    <!-- NEW: Added password strength script, adapted from register.html -->
    <script>
        // Client-side password strength checker
        function checkResetPasswordStrength() {
            // Use the ID from this page's input
            const password = document.getElementById('new_password').value; 
            const strengthBar = document.getElementById('strength-bar-reset');
            const strengthText = document.getElementById('strength-text-reset');

            let score = 0;
            let feedback = [];

            // Length
            if (password.length >= 8) {
                score += 20;
            } else {
                feedback.push("At least 8 characters");
            }

            // Lowercase
            if (/[a-z]/.test(password)) {
                score += 20;
            } else {
                feedback.push("Lowercase letter");
            }

            // Uppercase
            if (/[A-Z]/.test(password)) {
                score += 20;
            } else {
                feedback.push("Uppercase letter");
            }

            // Numbers
            if (/\d/.test(password)) {
                score += 20;
            } else {
                feedback.push("Number");
            }

            // Special characters
            if (/[!@#$%^&*(),.?":{}|<>]/.test(password)) {
                score += 20;
            } else {
                feedback.push("Special character");
            }

            strengthBar.style.width = score + '%';
            if (score < 40) {
                strengthBar.style.backgroundColor = '#f00'; // Red
                strengthText.textContent = 'Weak: ' + feedback.join(', ');
            } else if (score < 80) {
                strengthBar.style.backgroundColor = '#ffa500'; // Orange
                strengthText.textContent = 'Medium: ' + feedback.join(', ');
            } else {
                strengthBar.style.backgroundColor = '#0f0'; // Green
                strengthText.textContent = 'Strong!';
            }
            if (password.length === 0) {
                strengthBar.style.width = '0%';
                strengthText.textContent = '';
            }
        }
    </script>
</body>
</html>
