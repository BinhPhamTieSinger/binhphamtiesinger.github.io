<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - TieSinger</title>
    <link rel="stylesheet" href="/static/css/index.css">
    <link rel="stylesheet" href="/static/css/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header" id="myHeader">
        <div class="container header-content">
            <div class="logo-name">
                <img src="/static/assets/images/logo.png" alt="TieSinger Logo" class="logo">
                <h1>TieSinger</h1>
            </div>
            <nav class="navbar">
                <ul>
                    <li><a href="/">Home</a></li>
                    <li><a href="/forum">Forum</a></li>
                    <li><a href="/announcements">Announcements</a></li>
                    <li><a href="/projects">Projects</a></li>
                    <li><a href="/login">Login</a></li>
                </ul>
            </nav>
            <div class="menu-toggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </header>

    <div class="auth-container">
        <div class="auth-card">
            <h2>Forgot Password</h2>
            
            {% if success %}
                <p class="success-message">{{ success }}</p>
            {% endif %}
            {% if error %}
                <p class="error-message">{{ error }}</p>
            {% endif %}

            <form action="/forgot-password" method="post">
                <div class="form-group">
                    <label for="email">Enter your account email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <button type="submit" class="btn btn-auth">Send Reset Instructions</button>
            </form>
            
            <p class="auth-link">Remembered your password? <a href="/login">Back to Login</a></p>
        </div>
    </div>

    <script src="/static/js/index.js"></script>
</body>
</html>
